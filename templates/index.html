<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Control — Mission Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="shell">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="brand">
      <svg class="brand__mark" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="9.5" stroke="#ffb020" stroke-width="1.3" opacity="0.5"/>
        <circle cx="12" cy="12" r="5.5" stroke="#ffb020" stroke-width="1.3" opacity="0.75"/>
        <circle cx="12" cy="12" r="1.7" fill="#ffb020"/>
      </svg>
      <div class="brand__text">
        <h1>Task Control</h1>
        <p>Mission log</p>
      </div>
    </div>

    <button id="btn-new-task" class="btn btn--accent" style="width:100%; justify-content:center;">+ New task</button>

    <div class="sidebar__section">
      <div class="sidebar__label">Status</div>
      <button class="nav-btn active" data-status-filter="">
        <span>All tasks</span><span class="nav-btn__count" id="nav-count-all">0</span>
      </button>
      <button class="nav-btn" data-status-filter="pending">
        <span>Pending</span><span class="nav-btn__count" id="nav-count-pending">0</span>
      </button>
      <button class="nav-btn" data-status-filter="in_progress">
        <span>In progress</span><span class="nav-btn__count" id="nav-count-in_progress">0</span>
      </button>
      <button class="nav-btn" data-status-filter="done">
        <span>Done</span><span class="nav-btn__count" id="nav-count-done">0</span>
      </button>
    </div>

    <div class="sidebar__section">
      <div class="sidebar__label">Categories</div>
      <div id="category-nav"></div>
    </div>

    <div class="clock-panel" id="clock-panel">
      <div class="clock-panel__time" id="clock-time">--:--:--</div>
      <div class="clock-panel__date" id="clock-date">—</div>
    </div>

    <div class="user-card">
      <div class="user-card__avatar" id="user-avatar">?</div>
      <div class="user-card__info">
        <div class="user-card__name" id="user-name">{{ username or "Operator" }}</div>
        <a href="/logout" class="user-card__logout">Sign out</a>
      </div>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <main class="main">

    <!-- Instrument panel -->
    <section class="instrument">
      <div class="instrument__top">
        <div class="instrument__heading">
          <h2 id="board-heading">All tasks</h2>
          <p id="board-subheading">Everything on the board, sorted by priority and due date.</p>
        </div>
      </div>

      <div>
        <div class="runway__label">
          <span>Completion</span>
          <span id="runway-pct">0%</span>
        </div>
        <div class="runway__track">
          <div class="runway__fill" id="runway-fill" style="width:0%"></div>
          <div class="runway__ticks"></div>
        </div>
      </div>

      <div class="instrument__stats" id="runway-stats">
        <span class="stat-chip"><i class="dot dot--pending"></i>Pending <b id="stat-pending">0</b></span>
        <span class="stat-chip"><i class="dot dot--progress"></i>In progress <b id="stat-progress">0</b></span>
        <span class="stat-chip"><i class="dot dot--done"></i>Done <b id="stat-done">0</b></span>
        <span class="stat-chip alert"><i class="dot dot--high"></i>High priority open <b id="stat-high">0</b></span>
      </div>
    </section>

    <!-- Toolbar -->
    <section class="toolbar">
      <div class="toolbar__search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
          <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="search" id="search" placeholder="Search tasks by title or description…" autocomplete="off">
      </div>
      <select id="filter-priority">
        <option value="">All priorities</option>
        <option value="high">High priority</option>
        <option value="medium">Medium priority</option>
        <option value="low">Low priority</option>
      </select>
      <button id="btn-clear-filters" class="btn btn--ghost">Clear</button>
    </section>

    <!-- Board -->
    <section class="board" id="board">
      <div class="column" data-status="pending">
        <div class="column__head">
          <h2>Pending</h2>
          <span class="column__count" id="count-pending">0</span>
        </div>
        <div class="column__list" id="list-pending"></div>
      </div>

      <div class="column" data-status="in_progress">
        <div class="column__head">
          <h2>In Progress</h2>
          <span class="column__count" id="count-in_progress">0</span>
        </div>
        <div class="column__list" id="list-in_progress"></div>
      </div>

      <div class="column" data-status="done">
        <div class="column__head">
          <h2>Done</h2>
          <span class="column__count" id="count-done">0</span>
        </div>
        <div class="column__list" id="list-done"></div>
      </div>
    </section>

  </main>
</div>

<!-- ============ TASK MODAL (add / edit) ============ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal__head">
      <h3 id="modal-title">New task</h3>
      <button class="modal__close" id="modal-close" aria-label="Close">&times;</button>
    </div>
    <form id="task-form">
      <input type="hidden" id="task-id">

      <label>Title
        <input type="text" id="field-title" required maxlength="120" placeholder="e.g. Draft API documentation">
      </label>

      <label>Description
        <textarea id="field-description" rows="3" placeholder="Optional details…"></textarea>
      </label>

      <div class="modal__row">
        <label>Category
          <input type="text" id="field-category" placeholder="e.g. Backend" value="General">
        </label>
        <label>Due date
          <input type="date" id="field-due">
        </label>
      </div>

      <div class="modal__row">
        <label>Priority
          <select id="field-priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </label>
        <label>Status
          <select id="field-status">
            <option value="pending" selected>Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </label>
      </div>

      <p class="form-error" id="form-error"></p>

      <div class="modal__actions">
        <button type="button" class="btn" id="btn-delete" style="display:none;">Delete</button>
        <div class="modal__actions-right">
          <button type="button" class="btn btn--ghost" id="btn-cancel">Cancel</button>
          <button type="submit" class="btn btn--accent">Save task</button>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
